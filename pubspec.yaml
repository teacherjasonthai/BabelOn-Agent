name: polite_translate
description: A multilingual translation app with a Politeness Engine and multimodal pipeline.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.14.0"

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.5+1
  openai_dart: ^4.1.0
  uuid: ^4.5.3
  http: ^1.6.0
  web_socket_channel: ^3.0.3
  json_annotation: ^4.8.0
  intl: ^0.20.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_sound: ^9.2.13
  permission_handler: 12.0.1
  image_picker: ^1.2.1
  camera: ^0.12.0+1
  cupertino_icons: ^1.0.5
  flutter_dotenv: ^6.0.0
  flutter_lints: ^6.0.0
  file_picker: ^11.0.2
  flutter_tts: ^4.0.0
  speech_to_text: ^7.0.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  json_serializable: ^6.6.1
  lint: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/tts_cache/
    - .env  # <--- ADD THIS LINE

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"